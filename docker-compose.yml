services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  rag-bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      - qdrant
    restart: always
    volumes:
      - rag_cache:/app/.cache

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "8000"
    environment:
      QDRANT_URL: "http://qdrant:6333"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    command: ["python", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - qdrant
    restart: always
    volumes:
      - rag_cache:/app/.cache
      - rag_uploads:/app/uploads

volumes:
  qdrant_storage:
  rag_cache:
  rag_uploads:
