services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: universal_rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  rag-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: universal_rag_bot
    env_file:
      - .env
    network_mode: "host"
    environment:
      QDRANT_URL: "http://localhost:6333"
    restart: always
    volumes:
      - ./.cache:/app/.cache

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: universal_rag_api
    env_file:
      - .env
    network_mode: "host"
    environment:
      QDRANT_URL: "http://localhost:6333"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    command: ["python", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: always
    volumes:
      - ./.cache:/app/.cache
      - ./uploads:/app/uploads

volumes:
  qdrant_storage:
