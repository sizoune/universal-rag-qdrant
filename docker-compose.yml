services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: universal_rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  rag-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: universal_rag_bot
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333
    restart: always
    volumes:
      - ./.cache:/app/.cache

volumes:
  qdrant_storage:
